# config/detection_repos.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Curated map of security platforms and vendors to their public detection
# repositories. Used by THEORY to surface relevant detection resources in
# dossier output based on an actor's targeted platforms and sectors.
#
# Fields:
#   name        — display name shown in the dossier
#   url         — link to the public detection repo or resource
#   platform    — the technology/platform this covers
#   tags        — used to match against actor target sectors and techniques
#   tier        — 1=vendor-official, 2=community-maintained, 3=reference
# ─────────────────────────────────────────────────────────────────────────────

detection_repos:

  # ── SIEM / Detection Platforms ───────────────────────────────────────────

  - name: "Elastic Detection Rules"
    url: "https://github.com/elastic/detection-rules"
    platform: "elastic"
    tags: [siem, endpoint, cloud, linux, windows, network]
    tier: 1

  - name: "Splunk Security Content"
    url: "https://github.com/splunk/security_content"
    platform: "splunk"
    tags: [siem, endpoint, cloud, windows, network, threat-hunting]
    tier: 1

  - name: "Microsoft Sentinel Detection Templates"
    url: "https://github.com/Azure/Azure-Sentinel"
    platform: "sentinel"
    tags: [siem, cloud, azure, windows, identity, office365]
    tier: 1

  - name: "Google SecOps / Chronicle Rules"
    url: "https://github.com/chronicle/detection-rules"
    platform: "chronicle"
    tags: [siem, cloud, gcp, network, endpoint]
    tier: 1

  - name: "Panther Detection Library"
    url: "https://github.com/panther-labs/panther-analysis"
    platform: "panther"
    tags: [siem, cloud, aws, saas, identity]
    tier: 1

  - name: "SigmaHQ Community Rules"
    url: "https://github.com/SigmaHQ/sigma"
    platform: "sigma"
    tags: [siem, endpoint, windows, linux, cloud, network, universal]
    tier: 2

  # ── Endpoint / EDR ───────────────────────────────────────────────────────

  - name: "CrowdStrike Adversary Intelligence"
