# THEORY — Vendor Intelligence Feed Registry
# ============================================
# Curated threat intelligence sources with RSS feeds and research blog URLs.
#
# Structure:
#   name:       Display name in dossier
#   url:        Primary blog/research URL
#   rss:        RSS feed URL (preferred for fetching)
#   type:       rss | blog
#   tier:       1=government/nonprofit  2=major vendor  3=community
#   apt_focus:  true if source specifically covers nation-state actors
#   tags:       Topic tags for relevance filtering
#   enabled:    true/false
#
# Adding paywalled sources:
#   Add session cookie to .env as FEED_COOKIE_<NAME_SLUG>=value
#   Example: FEED_COOKIE_RECORDED_FUTURE=your_cookie
#
# Adding custom sources:
#   Add entries to the "custom" list at the bottom of this file.
#   Same format — THEORY picks them up automatically.

sources:

  # ── Tier 1: Government & Nonprofit ──────────────────────────────────

  - name: CISA Cybersecurity Advisories
    url: https://www.cisa.gov/uscert/ncas/alerts
    rss: https://us-cert.cisa.gov/ncas/alerts.xml
    type: rss
    tier: 1
    apt_focus: true
    tags: [government, advisories, critical-infrastructure]
    enabled: true

  - name: NSA Cybersecurity Advisories
    url: https://www.nsa.gov/Press-Room/Cybersecurity-Advisories-Guidance/
