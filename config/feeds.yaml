# THEORY — Vendor Intelligence Feed Registry
# ============================================
# Verified working RSS feeds — April 2026.
# Run with --verbose to check feed health:
#   python3 theory.py --actor APT28 --sources mitre,vendor --verbose
#
# Adding custom sources: add entries to the "custom" list at the bottom.
# Paywalled: set FEED_COOKIE_<NAME_SLUG>=value in .env

