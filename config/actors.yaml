# config/actors.yaml
# ─────────────────────────────────────────────────────────────────────────────
# THEORY Actor Alias Table
#
# This file defines the canonical actor names and all known aliases used
# across intelligence sources. Any name or alias in this file will resolve
# to the canonical name in dossier output and file naming.
#
# To add a new actor: add a new top-level key with aliases, origin, and
# motivation. No Python knowledge required.
#
# Fields:
#   aliases    — list of all known names in lowercase (include the canonical
#                name itself in lowercase, MITRE Group ID, all vendor names)
#   origin     — country or region of attribution (optional)
#   motivation — primary motivation: espionage | financial | hacktivism |
#                destruction | unknown
#
# Contributing: see CONTRIBUTING.md for alias guidelines.
# ─────────────────────────────────────────────────────────────────────────────

