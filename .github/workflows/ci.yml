# THEORY — Continuous Integration
# Runs on every push and pull request to main
# Tests all 296 passing tests across 9 phases

name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p .cache output/dossiers

      - name: Run scaffold setup (if scaffold.sh exists)
        run: |
          if [ -f scaffold.sh ]; then
            chmod +x scaffold.sh
          fi

      - name: Run all tests
        run: |
          pytest tests/ -v --tb=short
        env:
          # Tests run fully offline — no real API keys needed
          # Mocked in test suite via unittest.mock
          ANTHROPIC_API_KEY: ""
          OTX_API_KEY: ""
          GITHUB_TOKEN: ""

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --select E,F,W --ignore E501,E402
        # E501 = line too long (we allow long lines for readability)
        # E402 = module level import not at top (some collectors do this)
