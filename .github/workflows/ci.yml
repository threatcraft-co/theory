name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create required directories
        run: |
          mkdir -p .cache output/dossiers config

      - name: Create minimal actors.yaml for tests
        run: |
          cat > config/actors.yaml << 'EOF'
          actors:
            APT28:
              origin: Russia
              motivation: espionage
              aliases:
                - apt28
                - fancy bear
                - g0007
            APT29:
              origin: Russia
              motivation: espionage
              aliases:
                - apt29
                - cozy bear
                - g0016
            Lazarus Group:
              origin: North Korea
              motivation: financial
              aliases:
                - lazarus group
                - lazarus
                - g0032
          EOF

      - name: Run all tests
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ""
          OTX_API_KEY: ""
          GITHUB_TOKEN: ""

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check . --select E,F,W \
            --ignore E501,E402,W291,W292,W293,E701,E702,F401,F541,F841,F811,F821
        # E501 = line too long
        # E402 = module level import not at top
        # W291/W292/W293 = trailing whitespace (ASCII banner lines)
        # E701/E702 = multiple statements on one line (compact style throughout)
        # F401 = imported but unused (conditional imports in collectors)
        # F541 = f-string without placeholders
        # F841 = local variable assigned but never used
        # F811 = redefinition of unused name (type: ignore comments + proxy pattern)
        # F821 = undefined name (dynamic function insertion pattern in _cli.py)
